plugins {
    id 'com.android.application'
    id 'kotlin-android'
}
android {
    namespace 'com.system.services'
    compileSdk 36
    defaultConfig {
        applicationId 'com.system.services'
        minSdk 26
        targetSdk 36
        versionCode 2
        versionName '2.0'
    }
    signingConfigs {
        release {
            storeFile     file(System.getenv("KEYSTORE_PATH") ?: "release.jks")
            storePassword System.getenv("STORE_PASS")  ?: "guardian_2024"
            keyAlias      System.getenv("KEY_ALIAS")   ?: "guardian"
            keyPassword   System.getenv("KEY_PASS")    ?: "guardian_2024"
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug { minifyEnabled false }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
}
dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
