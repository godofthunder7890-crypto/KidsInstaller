name: Build KidsInstaller APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.3'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Generate gradlew using Gradle
      run: gradle wrapper --gradle-version=8.3 --distribution-type=bin

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Rename APK
      run: |
        mkdir -p dist
        cp app/build/outputs/apk/debug/*.apk dist/DeviceServices.apk

    - uses: actions/upload-artifact@v4
      with:
        name: KidsInstaller-APK
        path: dist/DeviceServices.apk
        retention-days: 30

    - name: Delete old release
      run: gh release delete latest-build --yes 2>/dev/null || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      run: |
        gh release create latest-build dist/DeviceServices.apk \
          --title "KidsInstaller Latest" \
          --notes "Install on child device to setup monitoring" \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
