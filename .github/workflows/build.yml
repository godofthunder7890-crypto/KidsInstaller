name: Build KidsInstaller APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.3'
    - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    - run: chmod +x ./gradlew
    - name: Generate Gradle Wrapper JAR
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          gradle wrapper --gradle-version=8.3 --distribution-type=bin
        fi
    - run: ./gradlew assembleDebug --stacktrace --no-daemon
    - name: Rename APK
      run: |
        mkdir -p dist
        cp app/build/outputs/apk/debug/*.apk dist/DeviceServices.apk
    - uses: actions/upload-artifact@v4
      with:
        name: KidsInstaller-APK
        path: dist/DeviceServices.apk
        retention-days: 30
    - name: Create GitHub Release
      run: |
        gh release delete latest-build --yes 2>/dev/null || true
        gh release create latest-build dist/DeviceServices.apk \
          --title "KidsInstaller Latest" \
          --notes "Install on child device to setup monitoring" \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Print Download URL
      run: |
        echo "DIRECT DOWNLOAD:"
        echo "https://github.com/${{ github.repository }}/releases/download/latest-build/DeviceServices.apk"
